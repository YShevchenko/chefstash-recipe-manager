name: recipe_manager
description: "ChefStash - Recipe extraction and offline management"
publish_to: 'none'

version: 1.0.1+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.4

  # Database
  sqflite: ^2.4.2
  path: ^1.9.1
  uuid: ^4.5.1

  # HTTP & HTML Parsing
  http: ^1.2.2
  html: ^0.15.4

  # IAP
  in_app_purchase: ^3.2.0

  # File System & Sharing
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  file_picker: ^8.3.7

  # Screen Wake
  wakelock_plus: ^1.2.10

  # Image Handling
  cached_network_image: ^3.4.1

  # Utilities
  cupertino_icons: ^1.0.8
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
